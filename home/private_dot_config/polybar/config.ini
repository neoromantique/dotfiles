[global/wm]
margin-bottom = 0
margin-top = 0

[colors]
background = #0f0f0f
background-alt = #1a1a1a
foreground = #e0e0e0
primary = #e67e22
secondary = #b0b0b0
alert = #e74c3c
disabled = #888888
border = #333333

[bar/main]
bottom = true
width = 100%
height = 34
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 4pt
border-color = ${colors.background}

padding-left = 1
padding-right = 1
module-margin = 1

font-0 = "Terminus:size=12;2"
font-1 = "IBM Plex Mono:size=12;2"
font-2 = "JetBrainsMono Nerd Font:size=12;2"

modules-left = xworkspaces
modules-right = audio mic memory cpu wlan date tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/audio]
type = custom/script
interval = 1
exec = ~/.local/bin/polybar-audio
click-left = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
click-right = ~/.local/bin/audio-sink-cycle
click-middle = pavucontrol
scroll-up = ~/.local/bin/audio-sink-cycle up
scroll-down = ~/.local/bin/audio-sink-cycle down

[module/mic]
type = custom/script
interval = 1
exec = wpctl get-volume @DEFAULT_AUDIO_SOURCE@ | awk '{if ($3 == "[MUTED]") print "%{F#888888}MIC muted%{F-}"; else print "MIC " int($2*100) "%"}'
click-left = wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
click-right = pavucontrol
scroll-up = wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%+
scroll-down = wpctl set-volume @DEFAULT_AUDIO_SOURCE@ 5%-

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = MEM %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = CPU %percentage%%

[module/wlan]
type = internal/network
interface-type = wireless
label-connected = NET %essid%
label-disconnected = NET offline
label-disconnected-foreground = ${colors.disabled}

[module/date]
type = internal/date
interval = 1
date = TIME %Y-%m-%d %H:%M
label = %date%

[module/tray]
type = internal/tray
tray-spacing = 6px
tray-background = ${colors.background-alt}

[settings]
screenchange-reload = true
pseudo-transparency = true